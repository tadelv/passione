name: Build and Push dist Branch

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build-dist:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Compute dev version
        id: meta
        run: |
          BASE_VERSION=$(node -p "require('./manifest.json').version")
          ID=$(node -p "require('./manifest.json').id")
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          DEV_VERSION="${BASE_VERSION}-dev.${SHORT_SHA}.${{ github.run_number }}"
          echo "dev_version=${DEV_VERSION}" >> $GITHUB_OUTPUT
          echo "dev_skin_id=${ID}-dist" >> $GITHUB_OUTPUT
          echo "commit_msg=build: ${DEV_VERSION}" >> $GITHUB_OUTPUT

      - name: Build
        run: npm run build
        env:
          VITE_SKIN_ID: ${{ steps.meta.outputs.dev_skin_id }}
          VITE_APP_VERSION: ${{ steps.meta.outputs.dev_version }}

      - name: Write dev manifest
        run: |
          NAME=$(node -p "require('./manifest.json').name")
          DESC=$(node -p "require('./manifest.json').description")
          AUTHOR=$(node -p "require('./manifest.json').author")

          cat > dist/manifest.json << EOF
          {
            "id": "${{ steps.meta.outputs.dev_skin_id }}",
            "name": "${NAME} Dev",
            "description": "${DESC}",
            "version": "${{ steps.meta.outputs.dev_version }}",
            "author": "${AUTHOR}",
            "repository": "https://github.com/${{ github.repository }}"
          }
          EOF

      - name: Deploy to dist branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: dist
          force_orphan: true
          commit_message: ${{ steps.meta.outputs.commit_msg }}
